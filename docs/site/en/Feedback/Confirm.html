<!doctype html>
<html lang="uk">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Confirm Component — NaN•Web UI (en)</title>
		<meta
			name="description"
			content="Interactive Component Sandbox & Documentation for the NaN•Web UI ecosystem"
		/>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
			rel="stylesheet"
		/>
		<style>
			*,
			*::before,
			*::after {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}
			:root {
				--ide-bg: #0a0a0f;
				--ide-surface: #12121a;
				--ide-surface-2: #1a1a26;
				--ide-border: rgba(255, 255, 255, 0.06);
				--ide-border-bright: rgba(255, 255, 255, 0.12);
				--ide-text: #e4e4e7;
				--ide-text-muted: #71717a;
				--ide-accent: #0099dc;
				--ide-accent-dim: rgba(0, 153, 220, 0.12);
				--ide-success: #22c55e;
				--ide-danger: #ef4444;
				--ide-warning: #f59e0b;
				--ide-sidebar-w: 260px;
				--ide-radius: 10px;
				--ide-font: 'Inter', system-ui, -apple-system, sans-serif;
				--nav-h: 44px;
				--ba: #121212;
				--ba-surface: #1e1e1e;
				--fg: #e4e4e7;
				color-scheme: dark;
			}
			.theme-light {
				--ide-bg: #f8f9fa;
				--ide-surface: #ffffff;
				--ide-surface-2: #f1f5f9;
				--ide-border: rgba(0, 0, 0, 0.1);
				--ide-border-bright: rgba(0, 0, 0, 0.15);
				--ide-text: #18181b;
				--ide-text-muted: #64748b;
				--ide-accent: #0099dc;
				--ide-accent-dim: rgba(0, 153, 220, 0.08);
				--ba: #ffffff;
				--ba-surface: #f8f9fa;
				--fg: #18181b;
				color-scheme: light;
			}
			.theme-dark {
				--ide-bg: #0a0a0f;
				--ide-surface: #12121a;
				--ide-surface-2: #1a1a26;
				--ide-border: rgba(255, 255, 255, 0.06);
				--ide-border-bright: rgba(255, 255, 255, 0.12);
				--ide-text: #e4e4e7;
				--ide-text-muted: #71717a;
				--ide-accent: #0099dc;
				--ide-accent-dim: rgba(0, 153, 220, 0.12);
				--ba: #121212;
				--ba-surface: #1e1e1e;
				--fg: #e4e4e7;
				color-scheme: dark;
			}
			html,
			body {
				height: 100%;
			}
			body {
				font-family: var(--ide-font);
				background: var(--ide-bg);
				color: var(--ide-text);
				overflow: hidden;
				display: flex;
				flex-direction: column;
			}

			/* ─── Site Navbar (identical to docs) ─ */
			.site-nav {
				height: var(--nav-h);
				flex-shrink: 0;
				display: flex;
				align-items: center;
				gap: 12px;
				padding: 0 20px;
				background: color-mix(in srgb, var(--ide-surface) 80%, transparent);
				border-bottom: 1px solid var(--ide-border);
				backdrop-filter: blur(16px);
				-webkit-backdrop-filter: blur(16px);
				z-index: 100;
			}
			.site-nav a {
				text-decoration: none;
			}
			.site-nav .nav-brand {
				font-size: 0.68rem;
				font-weight: 700;
				letter-spacing: 0.1em;
				text-transform: uppercase;
				color: var(--ide-accent);
			}
			.site-nav .nav-sep {
				color: var(--ide-text-muted);
				font-size: 0.8rem;
				margin: 0 1px;
			}
			.site-nav .nav-pkg {
				font-size: 0.78rem;
				font-weight: 600;
				color: var(--ide-text);
			}
			.site-nav .nav-pkg:hover {
				color: var(--ide-accent);
			}
			.site-nav .nav-spacer {
				flex: 1;
			}
			.site-nav .nav-links {
				display: flex;
				align-items: center;
				gap: 6px;
			}
			.site-nav .nav-item {
				height: 30px;
				display: inline-flex;
				align-items: center;
				padding: 0 12px;
				border-radius: 6px;
				font-size: 0.72rem;
				font-weight: 600;
				color: var(--ide-text-muted);
				border: 1px solid transparent;
				transition: all 0.15s;
				white-space: nowrap;
				background: transparent;
				cursor: pointer;
				font-family: inherit;
			}
			.site-nav .nav-item:hover {
				color: var(--ide-accent);
				background: var(--ide-accent-dim);
			}
			.site-nav .nav-item.active {
				background: var(--ide-accent-dim);
				color: var(--ide-accent);
				border-color: var(--ide-accent);
			}
			.site-nav .nav-item.primary {
				background: var(--ide-accent);
				color: #fff;
				border-color: var(--ide-accent);
			}

			master-ide {
				flex: 1;
				overflow: hidden;
			}

			@media (max-width: 768px) {
				.site-nav .hide-mobile {
					display: none;
				}
			}
		</style>
	</head>
	<body>
		<nav class="site-nav">
			<a href="https://nan0web.yaro.page" target="_blank" class="nav-brand">nan•web</a>
			<span class="nav-sep">/</span>
			<a href="/" class="nav-pkg">ui</a>
			<span class="nav-spacer"></span>
			<div class="nav-links">
				<a href="/" class="nav-item hide-mobile" data-i18n="docs">Документація</a>
				<a href="/#architecture-map" class="nav-item hide-mobile" data-i18n="map"
					>Карта інтерфейсів</a
				>
				<a href="/ide.html" class="nav-item active primary">Master IDE</a>
				<button class="nav-item" id="ide-lang-toggle">UK</button>
				<button class="nav-item" id="ide-theme-toggle">◑</button>
			</div>
		</nav>
		<master-ide lang="en" active-component="Confirm"></master-ide>
		<script type="module">
			// Detect initial lang from path (SEO)
			const pathLang = window.location.pathname.startsWith('/en/')
				? 'en'
				: window.location.pathname.startsWith('/uk/')
					? 'uk'
					: localStorage.getItem('ui-docs-lang') || 'uk'
			localStorage.setItem('ui-docs-lang', pathLang)

			// Nav i18n
			const _navI18n = {
				uk: { docs: 'Документація', map: 'Карта інтерфейсів' },
				en: { docs: 'Documentation', map: 'Interface Map' },
			}
			function _translateNav(lang) {
				const t = _navI18n[lang] || _navI18n.uk
				document.querySelectorAll('[data-i18n]').forEach((el) => {
					const key = el.dataset.i18n
					if (t[key]) el.textContent = t[key]
				})
			}
			_translateNav(pathLang)

			const theme = localStorage.getItem('ui-theme') || 'auto'
			if (theme === 'light') document.documentElement.classList.add('theme-light')
			else if (theme === 'dark') document.documentElement.classList.add('theme-dark')

			// Theme toggle
			const themeBtn = document.getElementById('ide-theme-toggle')
			let currentTheme = theme
			function setTheme(t) {
				document.documentElement.classList.remove('theme-light', 'theme-dark')
				if (t === 'light') document.documentElement.classList.add('theme-light')
				else if (t === 'dark') document.documentElement.classList.add('theme-dark')
				themeBtn.textContent = t === 'dark' ? '☀' : t === 'light' ? '◐' : '◑'
				localStorage.setItem('ui-theme', t)
				currentTheme = t
				// Also sync with master-ide internal theme
				const ide = document.querySelector('master-ide')
				if (ide && ide._applyTheme) ide._applyTheme(t)
			}
			themeBtn.textContent = currentTheme === 'dark' ? '☀' : currentTheme === 'light' ? '◐' : '◑'
			themeBtn.addEventListener('click', () => {
				const next = currentTheme === 'auto' ? 'light' : currentTheme === 'light' ? 'dark' : 'auto'
				setTheme(next)
			})

			// Lang toggle
			const langBtn = document.getElementById('ide-lang-toggle')
			let currentLang = localStorage.getItem('ui-docs-lang') || 'uk'
			langBtn.textContent = currentLang.toUpperCase()
			langBtn.addEventListener('click', () => {
				const targetLang = currentLang === 'uk' ? 'en' : 'uk'
				currentLang = targetLang
				localStorage.setItem('ui-docs-lang', currentLang)
				langBtn.textContent = currentLang.toUpperCase()
				_translateNav(currentLang)

				const ide = document.querySelector('master-ide')
				if (ide) ide.setAttribute('lang', currentLang)
				document.documentElement.lang = currentLang

				// Update URL without reload
				let path = location.pathname
				const match = path.match(/\/(uk|en)\//)
				if (match) {
					path = path.replace(`/${match[1]}/`, `/${currentLang}/`)
				} else if (path === '/ide.html') {
					path = `/${currentLang}/ide.html`
				}
				history.pushState(null, '', path + location.hash)
			})
		</script>
		<script type="module" src="../../src/main.js"></script>
	</body>
</html>
